<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigilante Store | Windows 11 Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Gerçek Windows 11 Renk Paleti */
            background: radial-gradient(circle at 50% 50%, #1c2b5a 0%, #0a0e1a 100%);
            overflow: hidden;
            color: white;
        }

        /* Arka plana derinlik veren hareketli ışık katmanı */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), 
                        radial-gradient(circle at 20% 30%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 0, 50, 0.1) 0%, transparent 40%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Windows 11 Mica (Cam) Paneli */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 40px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255, 0, 50, 0.15);
            color: #ff0032;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 0, 50, 0.3);
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 40px;
            font-size: 1.05rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        /* Opera GX Stili Buton */
        .btn-primary {
            background: #ff0032;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 0, 50, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 0, 50, 0.5);
            background: #ff1a47;
        }

        /* Windows Modern Buton */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="status-badge">System Online</div>
        <h1>VIGILANTE</h1>
        <p>Premium oyun ve uygulama kütüphanesi. Windows 11 altyapısıyla optimize edilmiş sınırsız erişim noktası.</p>
        
        <div class="btn-group">
            <a href="#" class="btn btn-primary">PC (TORRENT) İNDİR</a>
            <a href="#" class="btn btn-secondary">MOBİL (APK) İNDİR</a>
        </div>
    </div>

</body>
</html>
