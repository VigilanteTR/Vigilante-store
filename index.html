<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VigilanteTR Store</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 15px 0; border-bottom: 2px solid #f42a41; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 22px; color: #f42a41; text-transform: uppercase; letter-spacing: 2px; }
        
        .game-card { background: #161b22; border-radius: 12px; padding: 12px; display: flex; align-items: center; margin-bottom: 12px; border: 1px solid #30363d; }
        .game-img { width: 60px; height: 60px; border-radius: 8px; margin-right: 12px; border: 1px solid #f42a41; }
        .game-info { flex-grow: 1; }
        .game-info h3 { margin: 0; font-size: 16px; }
        
        .download-btn { background-color: #f42a41; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* İndirme Overlay (Ekranı Kaplayan Panel) */
        #download-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .progress-container { width: 80%; background-color: #30363d; border-radius: 20px; margin: 20px 0; }
        .progress-bar { width: 0%; height: 20px; background-color: #f42a41; border-radius: 20px; transition: width 0.1s linear; }
        .status-text { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header"><h1>VIGILANTE STORE</h1></div>

    <div id="game-list">
        <div class="game-card">
            <img src="https://img.androidoyun.club/2014/11/five-nights-at-freddys-full-apk.jpg" class="game-img">
            <div class="game-info"><h3>FNAF 1</h3></div>
            <button class="download-btn" onclick="startDownload('FNAF 1', 'https://androidoyun.club/2025/09/five-nights-at-freddys-v2-0-7-mod-apk-kilitler-acik.html')">YÜKLE</button>
        </div>

        <div class="game-card">
            <img src="https://img.androidoyun.club/2024/11/minecraft-pocket-edition-full-apk.jpg" class="game-img">
            <div class="game-info"><h3>MINECRAFT</h3></div>
            <button class="download-btn" onclick="startDownload('Minecraft', 'https://androidoyun.club/2026/03/minecraft-v1-26-10-26-1-26-3-1-full-apk-beta-final.html')">YÜKLE</button>
        </div>

        </div>

    <div id="download-overlay">
        <div class="status-text" id="dl-name">Dosya Hazırlanıyor...</div>
        <div class="progress-container">
            <div class="progress-bar" id="myBar"></div>
        </div>
        <div id="percentText">0%</div>
        <p style="font-size: 12px; color: #8b949e; margin-top: 10px;">Vigilante Store Güvenli İndirme Sistemi</p>
    </div>

    <script>
        function startDownload(name, url) {
            document.getElementById('download-overlay').style.display = 'flex';
            document.getElementById('dl-name').innerText = name + " İndiriliyor...";
            
            var elem = document.getElementById("myBar");
            var text = document.getElementById("percentText");
            var width = 0;
            var id = setInterval(frame, 50); // Hız ayarı (50ms)

            function frame() {
                if (width >= 100) {
                    clearInterval(id);
                    // Bar dolunca siteye yönlendir
                    window.location.href = url;
                } else {
                    width++;
                    elem.style.width = width + '%';
                    text.innerHTML = width + '%';
                }
            }
        }
    </script>
</body>
</html>
