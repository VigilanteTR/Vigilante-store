<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigilante Store | Premium</title>
    <style>
        :root {
            --gx-red: #ff0032;
            --gx-bg: #050507;
            --gx-card: #0f0f12;
        }

        body {
            background-color: var(--gx-bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif; /* Daha teknolojik bir font */
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 50, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 50, 0.05) 0%, transparent 40%);
        }

        /* Arka plandaki o meşhur teknolojik çizgiler */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(255, 0, 50, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 50, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black, transparent 80%);
            z-index: -1;
            opacity: 0.3;
        }

        header {
            padding: 80px 20px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 20px var(--gx-red);
        }

        .hero {
            max-width: 900px;
            margin: 0 auto 50px;
            background: rgba(15, 15, 18, 0.8);
            border: 1px solid rgba(255, 0, 50, 0.2);
            padding: 40px;
            position: relative;
            backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%); /* Köşeli GX kesimi */
        }

        /* Köşedeki kırmızı süs çizgisi */
        .hero::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 2px;
            background: var(--gx-red);
            box-shadow: 0 0 15px var(--gx-red);
        }

        .hero h2 { color: var(--gx-red); font-size: 1.5rem; text-transform: uppercase; }
        .hero p { color: #ccc; line-height: 1.8; font-size: 1.1rem; }

        .btn-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .gx-btn {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            background: transparent;
            color: #fff;
            border: 1px solid var(--gx-red);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .gx-btn:hover {
            background: var(--gx-red);
            box-shadow: 0 0 30px rgba(255, 0, 50, 0.6);
            transform: translateY(-3px);
        }

        .apk-btn { border-color: #4CAF50; }
        .apk-btn:hover { background: #4CAF50; box-shadow: 0 0 30px rgba(76, 175, 80, 0.6); }

    </style>
</head>
<body>

    <header>
        <h1>VIGILANTE</h1>
    </header>

    <div class="hero">
        <h2>STORE CONNECT</h2>
        <p>Tek Platform, Sınırsız Erişim. <b>PC</b> için yüksek hızlı <b>Torrent</b> ağımıza katılın veya <b>Mobil</b> cihazlarınız için özel geliştirilmiş kütüphanemizi keşfedin.</p>
        
        <div class="btn-container">
            <a href="#" class="gx-btn">PC İÇİN İNDİR</a>
            <a href="#" class="gx-btn apk-btn">MOBİL İÇİN İNDİR</a>
        </div>
    </div>

</body>
</html>
